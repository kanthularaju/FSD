<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Transitions & Animations Demo</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>

    <header>
        <h1>CSS Transitions & Animations</h1>
    </header>

    <div class="container">

        <div class="card">
            <h2>Color Transition</h2>
            <div class="box color-box"></div>
        </div>

        <div class="card">
            <h2>Scale Transition</h2>
            <div class="box scale-box"></div>
        </div>

        <div class="card">
            <h2>Rotate Transition</h2>
            <div class="box rotate-box"></div>
        </div>
        
        <div>
            <h2>Skew Transition</h2>
            <div class="box skew-box"></div>
        </div>

        <div>
            <h2>Shadow effect</h2>
            <div class="box shadow-box"></div>
        </div>

        <div>
            <h2>opacity</h2>
            <div class="box opacity-box"></div>
        </div>

        <div class="card">
            <h2>Bounce Animation</h2>
            <div class="box bounce-box"></div>
        </div>

        <div class="card">
            <h2>Spin Animation</h2>
            <div class="box spin-box"></div>
        </div>

        <div class="card">
            <h2>Pulse Animation</h2>
            <div class="box pulse-box"></div>
        </div>
        
        <div>
            <h2> Fade Animation </h2>
            <div class="box fade-box"></div>
        </div>

        <div>
            <h2> slide Animation </h2>
            <div class="box slide-box"></div>
        </div>

        <div>
            <h2> shake Animation </h2>
            <div class="box shake-box"></div>
        </div>
    </div>

</body>
</html>
